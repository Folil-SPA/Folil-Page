services:
  - type: web
    name: folil-labs
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SENDER_EMAIL
        scope: run
      - key: SENDER_PASSWORD
        scope: run
      - key: PORT
        value: "8080"
