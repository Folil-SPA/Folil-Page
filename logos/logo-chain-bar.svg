<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 24" fill="none">
  <!-- Amber: oval chain links (left, right) connected by bar -->
  <ellipse cx="8" cy="12" rx="5" ry="7" stroke="#e8903c" stroke-width="2"/>
  <ellipse cx="24" cy="12" rx="5" ry="7" stroke="#e8903c" stroke-width="2"/>
  <!-- Sage: center oval, interlocks both -->
  <ellipse cx="16" cy="12" rx="5" ry="7" stroke="#7fb069" stroke-width="2"/>
  <!-- Amber: bar connectors (over sage) -->
  <line x1="12" y1="12" x2="20" y2="12" stroke="#e8903c" stroke-width="2"/>
</svg>
