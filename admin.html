<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Folil Labs — Admin Waitlist</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a07; --surface: #131310; --surface2: #1a1a16;
      --border: rgba(255,255,255,0.07); --text: #f5f0e8; --muted: #666;
      --accent: #e8903c; --accent2: #7fb069;
      --accent-dim: rgba(232,144,60,0.10);
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* ── LOGIN ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2.5rem 2.5rem;
      width: 100%; max-width: 380px;
      text-align: center;
    }
    .login-logo {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      font-family: var(--font-display); font-size: 1.2rem; font-weight: 600;
      margin-bottom: 2rem;
    }
    .login-logo span { font-weight: 300; color: var(--muted); }
    .login-card h2 { font-family: var(--font-display); font-size: 1rem; font-weight: 500; color: var(--muted); margin-bottom: 1.5rem; }
    .login-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-input:focus { border-color: rgba(232,144,60,0.4); box-shadow: 0 0 0 3px rgba(232,144,60,0.08); }
    .login-btn {
      width: 100%; padding: 0.85rem;
      background: var(--accent); color: #000;
      border: none; border-radius: 10px;
      font-family: var(--font-display); font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.88; }
    .login-error { color: #ff6b6b; font-size: 0.82rem; margin-top: 0.75rem; display: none; }

    /* ── ADMIN PANEL ── */
    #admin-panel { display: none; }
    header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(10,10,7,0.85);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(1.5rem, 4vw, 3rem);
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-logo {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-display); font-size: 1rem; font-weight: 600;
    }
    .header-logo span { font-weight: 300; color: var(--muted); }
    .header-badge {
      font-size: 0.72rem; font-family: var(--font-display); font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--accent); background: var(--accent-dim);
      border: 1px solid rgba(232,144,60,0.2);
      padding: 0.2rem 0.6rem; border-radius: 4px;
    }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .btn-logout {
      padding: 0.4rem 1rem;
      background: none; color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-family: var(--font-display); font-size: 0.8rem;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

    main { padding: clamp(1.5rem, 4vw, 3rem); max-width: 1100px; margin: 0 auto; }

    /* ── SUMMARY CARDS ── */
    .summary-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1rem; margin-bottom: 2rem;
    }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem 1.75rem;
    }
    .summary-card .val {
      font-family: var(--font-display); font-size: 2rem; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -0.04em;
    }
    .summary-card .lbl { font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.25rem; flex-wrap: wrap;
    }
    .search-input {
      flex: 1; min-width: 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0.65rem 1rem;
      color: var(--text); font-family: var(--font-body); font-size: 0.875rem;
      outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: rgba(232,144,60,0.35); }
    .search-input::placeholder { color: var(--muted); }
    .btn-action {
      padding: 0.65rem 1.25rem;
      border-radius: 9px;
      font-family: var(--font-display); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; border: none; white-space: nowrap;
    }
    .btn-csv { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-csv:hover { color: var(--text); }
    .btn-clear { background: rgba(255,80,80,0.08); color: #ff6b6b; border: 1px solid rgba(255,80,80,0.2); }
    .btn-clear:hover { background: rgba(255,80,80,0.15); }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface2); }
    th {
      padding: 0.9rem 1.25rem;
      font-family: var(--font-display); font-size: 0.72rem;
      font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); text-align: left;
    }
    td {
      padding: 0.9rem 1.25rem;
      font-size: 0.875rem; color: var(--text);
      border-top: 1px solid var(--border);
    }
    tr:hover td { background: rgba(255,255,255,0.015); }
    .td-name { font-weight: 500; }
    .td-email a { color: var(--accent); text-decoration: none; }
    .td-email a:hover { text-decoration: underline; }
    .td-company { color: var(--muted); }
    .td-date { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }
    .td-del button {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 1rem; padding: 0.25rem 0.5rem;
      border-radius: 5px; transition: all 0.2s;
    }
    .td-del button:hover { color: #ff6b6b; background: rgba(255,80,80,0.08); }

    .empty-state {
      padding: 4rem 2rem; text-align: center; color: var(--muted);
      font-size: 0.9rem;
    }
    .empty-state svg { display: block; margin: 0 auto 1rem; opacity: 0.3; }

    @media (max-width: 640px) {
      .summary-grid { grid-template-columns: 1fr 1fr; }
      th:nth-child(3), td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M7 21C9 17 10 14 11.5 12C13 10 11 6.5 10.5 5" stroke="#e8903c" stroke-width="2" stroke-linecap="round"/>
        <path d="M17 21C15 17 14 14 12.5 12C11 10 13 6.5 13.5 5" stroke="#7fb069" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="3.5" r="1.5" fill="#e8903c"/>
      </svg>
      folil<span>labs</span>
    </div>
    <h2>Acceso al panel de waitlist</h2>
    <input type="password" id="pwd-input" class="login-input" placeholder="Contraseña" onkeydown="if(event.key==='Enter')login()" />
    <button class="login-btn" onclick="login()">Entrar</button>
    <p class="login-error" id="login-error">Contraseña incorrecta</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <header>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <div class="header-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M7 21C9 17 10 14 11.5 12C13 10 11 6.5 10.5 5" stroke="#e8903c" stroke-width="2" stroke-linecap="round"/>
          <path d="M17 21C15 17 14 14 12.5 12C11 10 13 6.5 13.5 5" stroke="#7fb069" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="3.5" r="1.5" fill="#e8903c"/>
        </svg>
        folil<span>labs</span>
      </div>
      <span class="header-badge">Admin</span>
    </div>
    <div class="header-right">
      <a href="index.html" style="font-size:0.8rem;color:var(--muted);text-decoration:none;">← Volver al sitio</a>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </header>

  <main>
    <div class="summary-grid">
      <div class="summary-card">
        <div class="val" id="stat-total">0</div>
        <div class="lbl">Total en lista de espera</div>
      </div>
      <div class="summary-card">
        <div class="val" id="stat-week">0</div>
        <div class="lbl">Registros esta semana</div>
      </div>
      <div class="summary-card">
        <div class="val" id="stat-company">0</div>
        <div class="lbl">Con empresa indicada</div>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" id="search" class="search-input" placeholder="Buscar por nombre, email o empresa…" oninput="renderTable()" />
      <button class="btn-action btn-csv" onclick="exportCSV()">Exportar CSV</button>
      <button class="btn-action btn-clear" onclick="clearAll()">Borrar todo</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Empresa</th>
            <th>Fecha</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <div class="empty-state" id="empty-state" style="display:none;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
        Aún no hay registros en la lista de espera.
      </div>
    </div>
  </main>
</div>

<script>
  // ── Contraseña (cambiar antes de subir a producción) ──
  const ADMIN_PASSWORD = 'folil2025';

  function login() {
    const val = document.getElementById('pwd-input').value;
    if (val === ADMIN_PASSWORD) {
      sessionStorage.setItem('folil_admin', '1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      loadData();
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('pwd-input').value = '';
      document.getElementById('pwd-input').focus();
    }
  }

  function logout() {
    sessionStorage.removeItem('folil_admin');
    location.reload();
  }

  // Auto-login si ya autenticado en esta sesión
  if (sessionStorage.getItem('folil_admin') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
  }

  function getEntries() {
    return JSON.parse(localStorage.getItem('folil_waitlist') || '[]');
  }

  function saveEntries(entries) {
    localStorage.setItem('folil_waitlist', JSON.stringify(entries));
  }

  function loadData() {
    const entries = getEntries();
    const now = Date.now();
    const weekAgo = now - 7 * 24 * 60 * 60 * 1000;

    document.getElementById('stat-total').textContent = entries.length;
    document.getElementById('stat-week').textContent = entries.filter(e => e.ts >= weekAgo).length;
    document.getElementById('stat-company').textContent = entries.filter(e => e.company).length;

    renderTable();
  }

  function renderTable() {
    const query = document.getElementById('search').value.toLowerCase();
    const entries = getEntries().filter(e =>
      !query ||
      (e.name || '').toLowerCase().includes(query) ||
      (e.email || '').toLowerCase().includes(query) ||
      (e.company || '').toLowerCase().includes(query)
    );

    const tbody = document.getElementById('table-body');
    const empty = document.getElementById('empty-state');

    if (entries.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    // Sort newest first
    const sorted = [...entries].sort((a, b) => b.ts - a.ts);
    tbody.innerHTML = sorted.map((e, i) => `
      <tr>
        <td style="color:var(--muted);font-size:0.8rem;">${sorted.length - i}</td>
        <td class="td-name">${esc(e.name)}</td>
        <td class="td-email"><a href="mailto:${esc(e.email)}">${esc(e.email)}</a></td>
        <td class="td-company">${esc(e.company || '—')}</td>
        <td class="td-date">${formatDate(e.ts)}</td>
        <td class="td-del"><button onclick="deleteEntry(${e.ts})" title="Eliminar">✕</button></td>
      </tr>
    `).join('');
  }

  function deleteEntry(ts) {
    if (!confirm('¿Eliminar este registro?')) return;
    saveEntries(getEntries().filter(e => e.ts !== ts));
    loadData();
  }

  function clearAll() {
    if (!confirm('¿Borrar TODOS los registros? Esta acción no se puede deshacer.')) return;
    localStorage.removeItem('folil_waitlist');
    loadData();
  }

  function exportCSV() {
    const entries = getEntries();
    if (!entries.length) { alert('No hay registros para exportar.'); return; }
    const header = 'Nombre,Email,Empresa,Fecha\n';
    const rows = entries
      .sort((a, b) => b.ts - a.ts)
      .map(e => `"${e.name}","${e.email}","${e.company || ''}","${formatDate(e.ts)}"`)
      .join('\n');
    const blob = new Blob([header + rows], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `folil-waitlist-${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  }

  function formatDate(ts) {
    return new Date(ts).toLocaleString('es-CL', { dateStyle: 'short', timeStyle: 'short' });
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Cargar si ya está autenticado
  if (sessionStorage.getItem('folil_admin') === '1') loadData();
</script>
</body>
</html>
